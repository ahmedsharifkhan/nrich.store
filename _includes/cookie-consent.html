<!-- ============================================================
     Cookie Consent Banner — Google Consent Mode V2
     ============================================================ -->
<div class="cc-banner" id="cc-banner" aria-live="polite" aria-label="Cookie consent" role="dialog" style="display:none">
  <div class="cc-inner">
    <div class="cc-text">
      <strong>আমরা কুকি ব্যবহার করি</strong>
      <p>আপনার অভিজ্ঞতা উন্নত করতে এবং বিজ্ঞাপন কাস্টমাইজ করতে আমরা কুকি ও ট্র্যাকিং প্রযুক্তি ব্যবহার করি। আপনি গ্রহণ বা প্রত্যাখ্যান করতে পারেন।</p>
    </div>
    <div class="cc-actions">
      <button class="cc-btn cc-accept" id="cc-accept">সম্মত হই</button>
      <button class="cc-btn cc-decline" id="cc-decline">প্রত্যাখ্যান করি</button>
    </div>
  </div>
</div>

<style>
.cc-banner {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 99999;
  background: #0d0d0d;
  color: #fff;
  padding: 0;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.35);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.cc-banner.visible { transform: translateY(0); }

@media (max-width: 768px) {
  .cc-banner { bottom: 64px; } /* above mobile nav */
}

.cc-inner {
  max-width: 1140px;
  margin: 0 auto;
  padding: 18px 24px;
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.cc-text {
  flex: 1;
  min-width: 220px;
  strong { display: block; font-size: 14px; margin-bottom: 4px; color: #CDB898; }
  p { font-size: 12.5px; color: rgba(255,255,255,0.72); margin: 0; line-height: 1.55; }
}

.cc-actions {
  display: flex;
  gap: 10px;
  flex-shrink: 0;
}

.cc-btn {
  padding: 9px 22px;
  border-radius: 20px;
  border: none;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.15s;
  &:hover { transform: scale(1.04); opacity: 0.9; }
}

.cc-accept {
  background: linear-gradient(135deg, #CDB898 0%, #A0876A 100%);
  color: #fff;
}

.cc-decline {
  background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.8);
  border: 1px solid rgba(255,255,255,0.2);
}
</style>

<script>
(function(){
  var CONSENT_KEY = 'nrich_consent';
  var banner = document.getElementById('cc-banner');
  if (!banner) return;

  // Already decided? skip banner
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem(CONSENT_KEY)); } catch(e){}
  if (saved && saved.choice) return;

  // Show banner after short delay
  setTimeout(function(){ banner.style.display = ''; setTimeout(function(){ banner.classList.add('visible'); }, 50); }, 800);

  function applyConsent(granted) {
    var state = granted ? 'granted' : 'denied';
    if (typeof gtag === 'function') {
      gtag('consent', 'update', {
        ad_storage:              state,
        ad_user_data:            state,
        ad_personalization:      state,
        analytics_storage:       state,
        functionality_storage:   'granted',
        personalization_storage: state,
        security_storage:        'granted'
      });
      if (granted) {
        gtag('set', 'ads_data_redaction', false);
        gtag('set', 'url_passthrough', false);
      }
    }
    try {
      localStorage.setItem(CONSENT_KEY, JSON.stringify({ choice: granted ? 'accept' : 'decline', ts: Date.now() }));
    } catch(e){}

    banner.classList.remove('visible');
    setTimeout(function(){ banner.style.display = 'none'; }, 450);
  }

  document.getElementById('cc-accept').addEventListener('click', function(){ applyConsent(true); });
  document.getElementById('cc-decline').addEventListener('click', function(){ applyConsent(false); });
})();
</script>
