<section class="newsletter-section">
  <div class="container">
    <div class="newsletter-inner">
      <div class="newsletter-text">
        <div class="section-eyebrow">Stay Connected</div>
        <h2 class="display-md">Get Exclusive Offers</h2>
        <p>Subscribe to our newsletter and be the first to know about new arrivals, sales, and style tips.</p>
      </div>
      <form class="newsletter-form" id="newsletter-form">
        <div class="newsletter-input-wrap">
          <input type="email" placeholder="Enter your email address" required aria-label="Email address" class="newsletter-input">
          <button type="submit" class="btn btn--primary">Subscribe</button>
        </div>
        <p class="newsletter-note">No spam, ever. Unsubscribe at any time.</p>
      </form>
    </div>
  </div>
</section>
