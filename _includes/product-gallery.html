{% assign first_image = page.images[0] %}

<div class="product-gallery">
  <!-- Thumbnails (left) -->
  <div class="gallery-thumbs">
    {% for img in page.images %}
    <button class="gallery-thumb {% if forloop.first %}active{% endif %}" data-src="{{ img }}" aria-label="View image {{ forloop.index }}">
      <img src="{{ img }}" alt="{{ page.name }} view {{ forloop.index }}" loading="lazy">
    </button>
    {% endfor %}
  </div>

  <!-- Main Image -->
  <div class="gallery-main-wrap">
    <img id="gallery-main-img" src="{{ first_image }}" alt="{{ page.name }}" loading="eager" fetchpriority="high" decoding="async">

    <!-- Controls -->
    {% if page.images.size > 1 %}
    <button class="gallery-nav gallery-prev" id="gallery-prev" aria-label="Previous image">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="gallery-nav gallery-next" id="gallery-next" aria-label="Next image">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    {% endif %}

    <button class="gallery-zoom-btn" id="gallery-zoom" aria-label="Zoom image">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
    </button>

    <!-- Image counter -->
    {% if page.images.size > 1 %}
    <div class="gallery-counter">1 / {{ page.images.size }}</div>
    {% endif %}
  </div>
</div>
