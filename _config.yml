# ==============================
# NRICH — Premium Lifestyle Fashion
# ==============================

title: NRICH
tagline: "Life is Rich. Wear It."
description: "NRICH is a premium lifestyle fashion brand. Shop sunglasses, watches, bags, caps, apparel and accessories in Bangladesh."
baseurl: ""
url: "https://nrich.store"

# Brand
brand_name: NRICH
brand_currency: BDT
brand_currency_symbol: "৳"
brand_email: hello@nrich.store
brand_phone: "+880 1700-000000"
brand_address: "House 12, Road 5, Banani, Dhaka 1213, Bangladesh"

# Logo — place files in /assets/images/
logo: "/assets/images/nrich-logo.png"
logo_white: "/assets/images/nrich-logo-white.png"
logo_icon: "/assets/images/nrich-icon.png"

# Order Webhook — Cash on Delivery
# Replace with your real endpoint (Formspree, Google Sheets, Airtable, Netlify, Vercel)
order_endpoint: "https://formspree.io/f/YOUR_FORM_ID"

# Delivery
delivery_charge: 80
free_delivery_above: 2000

# Tracking IDs — replace with real values
gtm_id: "GTM-XXXXXXX"
meta_pixel_id: ""
ga4_id: ""

# Social links
social:
  facebook: "https://facebook.com/nrich.store"
  instagram: "https://instagram.com/nrich.store"
  tiktok: ""
  youtube: ""

# Collections
collections:
  products:
    output: true
    permalink: /products/:slug/
  category_pages:
    output: true
    permalink: /category/:slug/

# Layout defaults
defaults:
  - scope:
      path: ""
      type: "products"
    values:
      layout: "product"
      page_type: "product"
  - scope:
      path: ""
      type: "category_pages"
    values:
      layout: "category"
      page_type: "category"
  - scope:
      path: "index.html"
    values:
      layout: "default"
  - scope:
      path: ""
    values:
      layout: "page"

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# Build settings
permalink: pretty
timezone: Asia/Dhaka

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - .gitignore
  - vendor
  - .github
  - .cloudcannon
