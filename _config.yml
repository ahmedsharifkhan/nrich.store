# ==============================
# NRICH — Premium Lifestyle Fashion
# ==============================

title: "NRICH — Life is Rich. Wear It."
tagline: "Life is Rich. Wear It."
description: "NRICH is a premium lifestyle fashion brand in Bangladesh. Shop sunglasses, watches, bags, caps, apparel and accessories. Cash on Delivery. Free delivery over ৳2500."
baseurl: ""
url: "https://nrich.store"
lang: "en"

# ── jekyll-seo-tag settings ──────────────────────────────────────
author:
  name: "NRICH"
  email: nrichbd.store@gmail.com

twitter:
  username: nrichstore
  card: summary_large_image

facebook:
  publisher: "https://www.facebook.com/nrichbd"

# NOTE: site.logo must stay as relative path (used in header/footer as {{ site.baseurl }}{{ site.logo }})
logo: "/assets/images/logo/nrich-logo-new.png"
logo_white: "/assets/images/logo/nrich-logo-new.png"
logo_icon: "/assets/images/logo/nrich-crown.png"

# Social — MUST keep facebook/instagram/youtube/tiktok keys (used in footer.html)
social:
  facebook: "https://www.facebook.com/nrichbd"
  instagram: "https://www.instagram.com/nrichbd.store"
  linkedin: "https://www.linkedin.com/company/nrichbd"
  tiktok: ""
  youtube: ""

# Social links array for schema/SEO (separate from template social keys)
seo_social_links:
  - "https://www.facebook.com/nrichbd"
  - "https://www.instagram.com/nrichbd.store"
  - "https://www.linkedin.com/company/nrichbd"

# ── Brand ────────────────────────────────────────────────────────
brand_name: NRICH
brand_currency: BDT
brand_currency_symbol: "৳"
brand_email: nrichbd.store@gmail.com
brand_phone: "+880 1830-846513"
brand_address: "House 12, Road 5, Banani, Dhaka 1213, Bangladesh"
brand_country: "BD"
brand_founded: "2024"

# ── Order Webhook — Cash on Delivery ─────────────────────────────
order_endpoint: "https://script.google.com/macros/s/AKfycbwkLqJiVaN9B3yBXyOAgFBpITLyYv3o0NID5V6AUEd2CPP_3H4LzhJdux2v3i10OYEj/exec"

# ── Contact Form Endpoint (Google Apps Script URL — paste after deploying) ──
contact_endpoint: "https://script.google.com/macros/s/AKfycbxqcFygPdwVA1S4B51Oc9Ky3q9GGWh5Rr7O2FLTx4z6IgZmDcYvBKl0i3mx3BF2fNRIoQ/exec"

# ── Delivery ─────────────────────────────────────────────────────
delivery_charge: 80
free_delivery_above: 2500

# ── Tracking IDs ─────────────────────────────────────────────────
gtm_id: "GTM-KVWZD7FN"
meta_pixel_id: ""
ga4_id: ""

# ── Facebook Catalog & CAPI ──────────────────────────────────────
fb_catalog_feed: "/catalog.xml"
fb_access_token: ""

# ── Collections ──────────────────────────────────────────────────
collections:
  products:
    output: true
    permalink: /products/:slug/
  category_pages:
    output: true
    permalink: /category/:slug/

# ── Layout defaults ──────────────────────────────────────────────
defaults:
  - scope:
      path: ""
      type: "products"
    values:
      layout: "product"
      page_type: "product"
      sitemap: true
  - scope:
      path: ""
      type: "category_pages"
    values:
      layout: "category"
      page_type: "category"
  - scope:
      path: "index.html"
    values:
      layout: "default"
      page_type: "home"
  - scope:
      path: ""
    values:
      layout: "page"

# ── Plugins ──────────────────────────────────────────────────────
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# ── Build settings ───────────────────────────────────────────────
permalink: pretty
timezone: Asia/Dhaka

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - .gitignore
  - vendor
  - .github
  - .cloudcannon
  - cloudcannon.config.yml
  - contact-form-script.gs
  - LICENSE
  - schemas
  - 301.txt
