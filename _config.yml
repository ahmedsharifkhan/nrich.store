# ==============================
# AURA — Premium Lifestyle Fashion
# ==============================

# Site
title: AURA
tagline: "Define Your Aura"
description: "AURA is a premium lifestyle fashion brand. Shop sunglasses, watches, bags, caps, apparel and accessories."
baseurl: ""
url: "https://yourdomain.com"

# Brand
brand_name: AURA
brand_currency: BDT
brand_currency_symbol: "৳"
brand_email: hello@aura.store
brand_phone: "+880 1700-000000"
brand_address: "House 12, Road 5, Banani, Dhaka 1213, Bangladesh"

# ==============================
# Analytics & Tracking
# ==============================
gtm_id: "GTM-XXXXXXX"        # Replace with your GTM ID
meta_pixel_id: ""              # Replace with your Meta Pixel ID
google_analytics_key: ""       # Optional — GA4 via GTM is preferred

# ==============================
# SEO / Social
# ==============================
logo: /assets/images/logo.svg
author:
  name: AURA
  email: hello@aura.store

social:
  instagram: "https://instagram.com/aura.store"
  facebook: "https://facebook.com/aura.store"
  twitter: "https://twitter.com/aura_store"
  youtube: ""
  tiktok: ""
  pinterest: ""

# ==============================
# Collections
# ==============================
collections:
  products:
    output: true
    permalink: /products/:slug/

# ==============================
# Defaults
# ==============================
defaults:
  - scope:
      path: ""
      type: "products"
    values:
      layout: "product"
  - scope:
      path: ""
    values:
      layout: "page"
  - scope:
      path: "index.html"
    values:
      layout: "default"

# ==============================
# Plugins
# ==============================
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# ==============================
# Build
# ==============================
permalink: pretty
timezone: Asia/Dhaka

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - .gitignore
  - vendor
  - .github
